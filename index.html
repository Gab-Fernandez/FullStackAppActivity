<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Full-Stack App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light not-authenticated">

<!-- SIMPLE NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm px-4">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold text-primary" href="#">FullStack App</a>

    <div class="ms-auto role-logged-out">
      <a href="#/login" class="btn btn-outline-primary btn-sm me-2">Login</a>
      <a href="#/register" class="btn btn-primary btn-sm">Register</a>
    </div>

    <div class="ms-auto role-logged-in">
      <span class="me-3 text-muted" id="userRole"></span>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>
</nav>

<!-- MAIN CONTAINER -->
<div class="container py-5">

  <!-- Dashboard -->
  <div id="dashboard-page" class="page active text-center">
    <h2 class="fw-bold mb-3">Welcome 👋</h2>
    <p class="text-muted">A simple full-stack prototype using localStorage.</p>
    <button class="btn btn-primary mt-3" onclick="navigateTo('register')">
      Get Started
    </button>
  </div>

  <!-- Login -->
  <div id="login-page" class="page">
    <div class="card simple-card mx-auto">
      <div class="card-body">
        <h4 class="mb-3 text-center">Login</h4>
        <form id="loginForm">
          <input type="email" id="loginEmail" class="form-control mb-3" placeholder="Email" required>
          <input type="password" id="loginPassword" class="form-control mb-3" placeholder="Password" required>
          <button class="btn btn-primary w-100">Login</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Register -->
  <div id="register-page" class="page">
    <div class="card simple-card mx-auto">
      <div class="card-body">
        <h4 class="mb-3 text-center">Create Account</h4>
        <form id="registerForm">
          <input type="text" id="registerFirstName" class="form-control mb-3" placeholder="First Name" required>
          <input type="text" id="registerLastName" class="form-control mb-3" placeholder="Last Name" required>
          <input type="email" id="registerEmail" class="form-control mb-3" placeholder="Email" required>
          <input type="password" id="registerPassword" class="form-control mb-3" placeholder="Password" required>
          <button class="btn btn-success w-100">Sign Up</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Profile -->
  <div id="profile-page" class="page">
    <div class="card simple-card mx-auto">
      <div class="card-body text-center">
        <h4 class="mb-3">My Profile</h4>
        <p id="profileName"></p>
        <p id="profileEmail"></p>
        <p id="profileRole"></p>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
